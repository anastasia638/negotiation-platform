image: maven:3.9-eclipse-temurin-17

stages:
  - build

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

cache:
  paths:
    - .m2/repository

build:
  stage: build
  script:
    - mvn clean package -DskipTests -q
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 week
