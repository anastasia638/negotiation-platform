services:

  # ─────────────────────────────────────
  # Base de données PostgreSQL
  # ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sa7-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-sa7}
      POSTGRES_USER: ${DB_USERNAME:-sa7user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-sa7user} -d ${DB_NAME:-sa7}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────
  # Application Spring Boot
  # ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sa7-app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-sa7}
      DB_USERNAME: ${DB_USERNAME:-sa7user}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
