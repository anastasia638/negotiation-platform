<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SA7 Luxury Agents</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand" onclick="navigate('accueil')">
      <span class="brand-diamond">◆</span>
      <div>
        <div class="brand-title">SA7 Luxury Agents</div>
        <div class="brand-sub">Marketplace intelligent avec négociation automatique</div>
      </div>
    </div>

    <div class="nav-links">
      <a class="nav-link" data-page="accueil" onclick="navigate('accueil')">Accueil</a>
      <a class="nav-link" data-page="marketplace" onclick="navigate('marketplace')">Marketplace</a>

      <div class="nav-dropdown">
        <a class="nav-link dropdown-toggle" onclick="toggleDropdown('marches')">
          Marchés <span class="arrow">▾</span>
        </a>
        <div class="dropdown-menu" id="dd-marches">
          <a onclick="navigate('marche-centralise')">🏛 Marché Centralisé</a>
          <a onclick="navigate('marche-decentralise')">🔀 Marché Décentralisé</a>
          <a onclick="navigate('achat-groupe')">👥 Achat Groupé</a>
        </div>
      </div>

      <div class="nav-dropdown">
        <a class="nav-link dropdown-toggle" onclick="toggleDropdown('donnees')">
          Données <span class="arrow">▾</span>
        </a>
        <div class="dropdown-menu" id="dd-donnees">
          <a onclick="navigate('historique')">📋 Historique</a>
          <a onclick="navigate('profil-agent')">👤 Profil Agent</a>
        </div>
      </div>

      <a class="nav-link nav-admin" data-page="admin" onclick="navigate('admin')">Admin</a>
    </div>

    <div class="nav-agent-badge" id="nav-agent-badge" style="display:none">
      <span class="agent-dot"></span>
      <span id="nav-agent-name">—</span>
    </div>
  </nav>

  <!-- MAIN -->
  <main id="app"></main>

  <!-- TOAST -->
  <div id="toasts"></div>

  <script src="/app.js"></script>
</body>
</html>
