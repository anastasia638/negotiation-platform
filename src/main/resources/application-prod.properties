# ==========================================
# PROFIL PROD - PostgreSQL + Flyway
# ==========================================

# Base de données PostgreSQL (valeurs injectées via variables d'environnement)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sa7}
spring.datasource.username=${DB_USERNAME:sa7user}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway activé en prod (gère les migrations)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT (secret obligatoire via variable d'environnement)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Logs prod (pas de debug)
logging.level.com.marketplace=INFO
logging.level.org.springframework.security=WARN
