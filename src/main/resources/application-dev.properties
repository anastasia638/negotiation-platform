# ==========================================
# PROFIL DEV - H2 en mémoire
# ==========================================

# Base de données H2 (in-memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA - H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (accès via http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Charger data.sql après que JPA ait créé les tables
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Flyway désactivé en dev (H2 ne supporte pas le schema PostgreSQL)
spring.flyway.enabled=false

# JWT (dev - secret non-sensible)
app.jwt.secret=dev-secret-key-sa7-marketplace-not-for-production-use
app.jwt.expiration-ms=86400000

# Logs détaillés en dev
logging.level.com.marketplace=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
