# Application
spring.application.name=sa7-marketplace
server.port=8080

# Database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Logging
logging.level.root=INFO
logging.level.com.marketplace=DEBUG

//C’est le fichier où tu mets la configuration Spring Boot : le port (server.port=8080), 
//la base de données (ici H2 en mémoire via spring.datasource.url=jdbc:h2:mem:testdb), 
//et les niveaux de logs (logging.level...).

